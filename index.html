<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Drive Video Library</title>
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DriveVids" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --bg3: #242424;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.14);
      --text: #efefef;
      --text2: #888;
      --text3: #444;
      --accent: #e8a030;
      --accent2: rgba(232,160,48,0.15);
      --radius: 12px;
      --radius-sm: 8px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overscroll-behavior: none; }

    /* ---- SCREENS ---- */
    .screen { display: none; flex-direction: column; height: 100vh; height: 100dvh; }
    .screen.active { display: flex; }

    /* ---- LOGIN SCREEN ---- */
    #screen-login { align-items: center; justify-content: center; padding: 2rem; background: var(--bg); }
    .login-box { width: 100%; max-width: 340px; text-align: center; }
    .app-icon { width: 80px; height: 80px; background: var(--accent); border-radius: 24px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; }
    .app-icon svg { width: 40px; height: 40px; fill: #111; }
    .login-box h1 { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
    .login-box p { font-size: 14px; color: var(--text2); margin: 8px 0 2rem; line-height: 1.6; }
    .btn-google { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; background: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; color: #111; cursor: pointer; transition: opacity 0.15s; }
    .btn-google:active { opacity: 0.85; }
    .btn-google img { width: 20px; height: 20px; }
    .login-note { font-size: 12px; color: var(--text3); margin-top: 16px; line-height: 1.6; }

    /* ---- MAIN APP ---- */
    #screen-main { background: var(--bg); }

    .topbar { display: flex; align-items: center; padding: calc(var(--safe-top) + 12px) 1rem 12px; background: var(--bg); border-bottom: 0.5px solid var(--border); gap: 10px; flex-shrink: 0; }
    .topbar-title { flex: 1; font-size: 18px; font-weight: 700; color: var(--text); }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #111; cursor: pointer; overflow: hidden; flex-shrink: 0; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .btn-icon { width: 36px; height: 36px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .btn-icon svg { width: 18px; height: 18px; stroke: var(--text2); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    /* Search bar */
    .search-bar { padding: 10px 1rem; background: var(--bg); border-bottom: 0.5px solid var(--border); flex-shrink: 0; display: none; }
    .search-bar.visible { display: block; }
    .search-bar input { width: 100%; padding: 9px 12px; font-size: 15px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg3); color: var(--text); font-family: inherit; outline: none; }
    .search-bar input:focus { border-color: var(--accent); }

    /* Filter tabs */
    .filter-row { display: flex; gap: 8px; padding: 10px 1rem; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); font-size: 13px; white-space: nowrap; cursor: pointer; flex-shrink: 0; }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #111; font-weight: 600; }

    /* Breadcrumb */
    .breadcrumb { display: flex; align-items: center; gap: 4px; padding: 6px 1rem; flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
    .breadcrumb::-webkit-scrollbar { display: none; }
    .bc-item { font-size: 13px; color: var(--text2); white-space: nowrap; cursor: pointer; }
    .bc-item:last-child { color: var(--accent); }
    .bc-sep { font-size: 13px; color: var(--text3); }

    /* File list */
    .file-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px 1rem calc(16px + var(--safe-bottom)); }

    .file-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; cursor: pointer; transition: background 0.1s; }
    .file-item:active { background: var(--bg3); }
    .file-thumb { width: 52px; height: 52px; border-radius: var(--radius-sm); background: var(--bg3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .file-thumb svg { width: 24px; height: 24px; }
    .file-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
    .file-arrow { color: var(--text3); font-size: 16px; flex-shrink: 0; }

    .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); font-weight: 600; margin: 16px 0 8px; }

    /* Loading */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem; gap: 12px; }
    .spinner { width: 32px; height: 32px; border: 2.5px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 14px; color: var(--text2); }

    .empty { text-align: center; padding: 3rem 1rem; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 14px; color: var(--text2); line-height: 1.6; }

    /* ---- PLAYER SCREEN ---- */
    #screen-player { background: #000; }
    .player-topbar { display: flex; align-items: center; gap: 10px; padding: calc(var(--safe-top) + 10px) 1rem 10px; background: rgba(0,0,0,0.8); position: absolute; top: 0; left: 0; right: 0; z-index: 10; }
    .btn-back { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .btn-back svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .player-title { flex: 1; font-size: 14px; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .video-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
    .video-wrap iframe { width: 100%; height: 100%; border: none; }

    .player-info { padding: 14px 1rem calc(14px + var(--safe-bottom)); background: var(--bg); border-top: 0.5px solid var(--border); flex-shrink: 0; }
    .player-title-big { font-size: 16px; font-weight: 600; color: var(--text); }
    .player-meta { font-size: 13px; color: var(--text2); margin-top: 4px; }

    /* Toast */
    .toast { position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 20px; padding: 9px 18px; font-size: 13px; color: var(--text); opacity: 0; transition: all 0.2s; pointer-events: none; white-space: nowrap; z-index: 9999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Profile menu */
    .profile-menu { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; display: none; }
    .profile-menu.open { display: block; }
    .profile-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
    .profile-sheet { position: absolute; bottom: 0; left: 0; right: 0; background: var(--bg2); border-radius: var(--radius) var(--radius) 0 0; padding: 1.5rem 1rem calc(1.5rem + var(--safe-bottom)); border-top: 0.5px solid var(--border2); }
    .profile-user { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
    .profile-avatar { width: 48px; height: 48px; border-radius: 50%; overflow: hidden; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #111; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-size: 16px; font-weight: 600; color: var(--text); }
    .profile-email { font-size: 13px; color: var(--text2); }
    .btn-signout { width: 100%; padding: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: transparent; color: #e05a5a; font-size: 15px; font-weight: 500; cursor: pointer; }
    .btn-signout:active { background: var(--bg3); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="login-box">
    <div class="app-icon">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <h1>Drive Vids</h1>
    <p>Stream any video from your Google Drive — no downloading, just tap and play.</p>
    <button class="btn-google" onclick="signIn()">
      <img src="https://www.google.com/favicon.ico" alt="Google" />
      Continue with Google
    </button>
    <p class="login-note">Only your video files are accessed. Nothing is modified or shared.</p>
  </div>
</div>

<!-- MAIN -->
<div class="screen" id="screen-main">
  <div class="topbar">
    <div class="topbar-title">Drive Vids</div>
    <div class="btn-icon" onclick="toggleSearch()">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></svg>
    </div>
    <div class="avatar" id="user-avatar" onclick="openProfile()"></div>
  </div>

  <div class="search-bar" id="search-bar">
    <input type="search" id="search-input" placeholder="Search videos and folders..." oninput="handleSearch()" />
  </div>

  <div class="filter-row" id="filter-row">
    <div class="filter-chip active" onclick="setFilter('all', this)">All</div>
    <div class="filter-chip" onclick="setFilter('video', this)">Videos only</div>
    <div class="filter-chip" onclick="setFilter('folder', this)">Folders only</div>
    <div class="filter-chip" onclick="setFilter('recent', this)">Recent</div>
  </div>

  <div class="breadcrumb" id="breadcrumb"></div>

  <div class="file-list" id="file-list">
    <div class="loading"><div class="spinner"></div><p>Loading your Drive...</p></div>
  </div>
</div>

<!-- PLAYER -->
<div class="screen" id="screen-player">
  <div style="position:relative; flex-shrink:0; height: calc(var(--safe-top) + 56px); background:#000;"></div>
  <div class="player-topbar">
    <div class="btn-back" onclick="closePlayer()">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </div>
    <div class="player-title" id="player-title-top">Playing...</div>
  </div>
  <div class="video-wrap" id="video-wrap">
    <iframe id="video-frame" src="" allowfullscreen allow="autoplay; fullscreen"></iframe>
  </div>
  <div class="player-info">
    <div class="player-title-big" id="player-title-big"></div>
    <div class="player-meta" id="player-meta"></div>
  </div>
</div>

<!-- PROFILE SHEET -->
<div class="profile-menu" id="profile-menu">
  <div class="profile-overlay" onclick="closeProfile()"></div>
  <div class="profile-sheet">
    <div class="profile-user">
      <div class="profile-avatar" id="profile-avatar"></div>
      <div>
        <div class="profile-name" id="profile-name"></div>
        <div class="profile-email" id="profile-email"></div>
      </div>
    </div>
    <button class="btn-signout" onclick="signOut()">Sign out</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CLIENT_ID = '57333869412-ivvskib2ee4snludado33srppjovlpu4.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
const VIDEO_MIMES = ['video/mp4','video/x-matroska','video/webm','video/quicktime','video/x-msvideo','video/mpeg','video/3gpp','video/x-flv'];

let tokenClient, accessToken, userInfo;
let folderStack = [{ id: 'root', name: 'My Drive' }];
let allFiles = [];
let currentFilter = 'all';
let searchMode = false;

// ---- AUTH ----
window.onload = () => {
  const saved = sessionStorage.getItem('dv_token');
  const user = sessionStorage.getItem('dv_user');
  if (saved && user) {
    accessToken = saved;
    userInfo = JSON.parse(user);
    showMain();
  }
};

function signIn() {
  google.accounts.id.initialize({ client_id: CLIENT_ID, callback: () => {} });
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { toast('Sign in failed: ' + resp.error); return; }
      accessToken = resp.access_token;
      sessionStorage.setItem('dv_token', accessToken);
      await fetchUserInfo();
      showMain();
    }
  });
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

async function fetchUserInfo() {
  const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { Authorization: 'Bearer ' + accessToken }
  });
  userInfo = await r.json();
  sessionStorage.setItem('dv_user', JSON.stringify(userInfo));
}

function signOut() {
  google.accounts.oauth2.revoke(accessToken);
  accessToken = null; userInfo = null;
  sessionStorage.clear();
  closeProfile();
  showScreen('login');
  folderStack = [{ id: 'root', name: 'My Drive' }];
}

// ---- SCREENS ----
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function showMain() {
  showScreen('main');
  updateAvatar();
  loadFolder('root');
}

function updateAvatar() {
  const av = document.getElementById('user-avatar');
  if (userInfo?.picture) {
    av.innerHTML = `<img src="${userInfo.picture}" alt="avatar" />`;
  } else {
    av.textContent = (userInfo?.name || 'U')[0].toUpperCase();
  }
}

// ---- DRIVE API ----
async function driveRequest(url) {
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
  if (r.status === 401) { toast('Session expired — please sign in again'); signOut(); return null; }
  return r.json();
}

async function loadFolder(folderId) {
  document.getElementById('file-list').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';
  renderBreadcrumb();

  let q = `'${folderId}' in parents and trashed=false`;
  const fields = 'files(id,name,mimeType,size,modifiedTime,thumbnailLink,videoMediaMetadata)';
  const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=${encodeURIComponent(fields)}&orderBy=folder,name&pageSize=200`;

  const data = await driveRequest(url);
  if (!data) return;

  allFiles = data.files || [];
  renderFiles();
}

async function searchDrive(query) {
  document.getElementById('file-list').innerHTML = '<div class="loading"><div class="spinner"></div><p>Searching...</p></div>';
  const mimeQ = VIDEO_MIMES.map(m => `mimeType='${m}'`).join(' or ');
  const q = `name contains '${query.replace(/'/g,"\\'")}' and (${mimeQ} or mimeType='application/vnd.google-apps.folder') and trashed=false`;
  const fields = 'files(id,name,mimeType,size,modifiedTime,thumbnailLink)';
  const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=${encodeURIComponent(fields)}&pageSize=100`;

  const data = await driveRequest(url);
  if (!data) return;
  allFiles = data.files || [];
  renderFiles();
}

// ---- RENDER ----
function renderFiles() {
  const list = document.getElementById('file-list');
  let files = [...allFiles];

  if (currentFilter === 'video') files = files.filter(f => VIDEO_MIMES.includes(f.mimeType));
  if (currentFilter === 'folder') files = files.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
  if (currentFilter === 'recent') files = files.filter(f => VIDEO_MIMES.includes(f.mimeType)).sort((a,b) => new Date(b.modifiedTime) - new Date(a.modifiedTime)).slice(0, 20);

  if (!files.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📂</div><p>${allFiles.length ? 'No items match this filter.' : 'This folder is empty.'}</p></div>`;
    return;
  }

  const folders = files.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
  const videos = files.filter(f => VIDEO_MIMES.includes(f.mimeType));
  const others = files.filter(f => f.mimeType !== 'application/vnd.google-apps.folder' && !VIDEO_MIMES.includes(f.mimeType));

  let html = '';
  if (folders.length && currentFilter !== 'video') {
    if (videos.length || others.length) html += `<div class="section-label">Folders</div>`;
    html += folders.map(f => fileCard(f)).join('');
  }
  if (videos.length) {
    if (folders.length && currentFilter !== 'folder') html += `<div class="section-label">Videos</div>`;
    html += videos.map(f => fileCard(f)).join('');
  }
  if (others.length && currentFilter === 'all') {
    html += `<div class="section-label">Other files</div>` + others.map(f => fileCard(f)).join('');
  }

  list.innerHTML = html;
}

function fileCard(f) {
  const isFolder = f.mimeType === 'application/vnd.google-apps.folder';
  const isVideo = VIDEO_MIMES.includes(f.mimeType);
  const size = f.size ? formatSize(parseInt(f.size)) : '';
  const date = f.modifiedTime ? new Date(f.modifiedTime).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'}) : '';
  const meta = [size, date].filter(Boolean).join(' · ');

  const thumb = f.thumbnailLink
    ? `<img src="${f.thumbnailLink}" alt="" />`
    : isFolder
      ? `<svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="${isVideo?'#e8a030':'#666'}" stroke-width="1.5" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;

  const action = isFolder
    ? `openFolder('${f.id}','${esc(f.name)}')`
    : isVideo
      ? `playVideo('${f.id}','${esc(f.name)}','${esc(meta)}')`
      : `toast('This file type cannot be played')`;

  return `
    <div class="file-item" onclick="${action}">
      <div class="file-thumb">${thumb}</div>
      <div class="file-info">
        <div class="file-name">${escHtml(f.name)}</div>
        <div class="file-meta">${isFolder ? 'Folder' : (isVideo ? '▶ Video' : 'File')}${meta ? ' · '+meta : ''}</div>
      </div>
      <div class="file-arrow">${isFolder ? '›' : isVideo ? '▶' : ''}</div>
    </div>`;
}

// ---- NAVIGATION ----
function openFolder(id, name) {
  folderStack.push({ id, name });
  loadFolder(id);
}

function goToBreadcrumb(index) {
  folderStack = folderStack.slice(0, index + 1);
  loadFolder(folderStack[folderStack.length - 1].id);
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = folderStack.map((f, i) => {
    const isLast = i === folderStack.length - 1;
    return (i > 0 ? '<span class="bc-sep">›</span>' : '') +
      `<span class="bc-item" onclick="goToBreadcrumb(${i})">${escHtml(f.name)}</span>`;
  }).join('');
}

// ---- PLAYER ----
function playVideo(id, name, meta) {
  const url = `https://drive.google.com/file/d/${id}/preview?access_token=${accessToken}`;
  document.getElementById('video-frame').src = url;
  document.getElementById('player-title-top').textContent = name;
  document.getElementById('player-title-big').textContent = name;
  document.getElementById('player-meta').textContent = meta || '';
  showScreen('player');
}

function closePlayer() {
  document.getElementById('video-frame').src = '';
  showScreen('main');
}

// ---- SEARCH ----
let searchTimer;
function toggleSearch() {
  const bar = document.getElementById('search-bar');
  bar.classList.toggle('visible');
  if (bar.classList.contains('visible')) {
    document.getElementById('search-input').focus();
  } else {
    document.getElementById('search-input').value = '';
    searchMode = false;
    loadFolder(folderStack[folderStack.length - 1].id);
  }
}

function handleSearch() {
  const q = document.getElementById('search-input').value.trim();
  clearTimeout(searchTimer);
  if (!q) { searchMode = false; loadFolder(folderStack[folderStack.length-1].id); return; }
  searchMode = true;
  searchTimer = setTimeout(() => searchDrive(q), 400);
}

// ---- FILTER ----
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderFiles();
}

// ---- PROFILE ----
function openProfile() {
  const p = userInfo || {};
  document.getElementById('profile-name').textContent = p.name || 'User';
  document.getElementById('profile-email').textContent = p.email || '';
  const pa = document.getElementById('profile-avatar');
  pa.innerHTML = p.picture ? `<img src="${p.picture}" alt="avatar" />` : (p.name||'U')[0].toUpperCase();
  document.getElementById('profile-menu').classList.add('open');
}
function closeProfile() { document.getElementById('profile-menu').classList.remove('open'); }

// ---- UTILS ----
function esc(s) { return String(s||'').replace(/'/g,"\\'"); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatSize(b) {
  if (b > 1e9) return (b/1e9).toFixed(1)+' GB';
  if (b > 1e6) return (b/1e6).toFixed(1)+' MB';
  if (b > 1e3) return (b/1e3).toFixed(0)+' KB';
  return b+' B';
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
